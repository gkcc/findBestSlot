  如影相随:
    two_piece: "追击和冲刺攻击伤害提高。"
    four_piece: "追击或冲刺攻击命中同属性敌人时叠加攻击力和暴击率增益。"
  法厄同之歌:
    two_piece: "异常掌控 +8%。"
