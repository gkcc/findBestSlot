  流光咏叹:
    two_piece: "以太伤害 +10%。"
    four_piece: "普通攻击命中后提高异常精通；目标处于失衡时装备者伤害提高。"
  沧浪行歌:
    two_piece: "物理伤害 +10%。"
    four_piece: "处于 Ether Veil 相关状态时暴击率提高；攻击型角色触发或延长状态时额外提高暴击率和攻击力。"
  雪兔梦游仙境:
    two_piece: "生命值 +10%。"
