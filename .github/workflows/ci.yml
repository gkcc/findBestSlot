name: CI

on:
  push:
  pull_request:

jobs:
  windows-quality:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: pnpm/action-setup@v4
        with:
          version: "11.7.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Install
        run: python -m pip install -e ".[dev,desktop,packaging]"
      - name: Install Tauri frontend
        working-directory: desktop
        run: pnpm install --frozen-lockfile
      - name: Compile
        run: python -m compileall -q src tests scripts
      - name: Lint
        run: python -m ruff check src tests scripts
      - name: Test
        run: python -m pytest -q
      - name: Tauri frontend test and build
        working-directory: desktop
        run: |
          pnpm test
          pnpm build
      - name: Rust format
        run: |
          cargo fmt --manifest-path rust/Cargo.toml --all --check
          cargo fmt --manifest-path desktop/src-tauri/Cargo.toml --all --check
      - name: Rust optimizer golden tests
        run: cargo test --locked --manifest-path rust/Cargo.toml
      - name: Packaged sidecars and Tauri executable
        shell: powershell
        run: .\scripts\build_tauri_windows.ps1 -SkipChecks -NoBundle
      - name: H=2 performance gate
        run: python scripts/benchmark_action_ev.py --threshold 60 --timeout 150 --report reports/ci-h2-benchmark.json
